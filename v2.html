<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⚽ 또또</title>
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
:root{
  --bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--sep:#38383a;
  --text:#fff;--muted:#8e8e93;--muted2:#aeaeb2;
  --green:#30d158;--green-dim:#248a3d;--gold:#ffd60a;--red:#ff453a;--blue:#0a84ff;--pink:#ff2d55;
  --mono:'Share Tech Mono',ui-monospace,monospace;
  --sys:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Segoe UI',Roboto,'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);min-height:100%;min-height:-webkit-fill-available}
html,body{overflow-anchor:none}   /* 뷰 전환 시 스크롤 앵커링이 위치를 고정해 스무스 스크롤을 막는 것 방지 */
body{background:var(--bg);color:var(--text);font-family:var(--sys);min-height:100vh;min-height:100svh;min-height:100dvh;-webkit-text-size-adjust:100%;padding-bottom:calc(90px + env(safe-area-inset-bottom));overflow-x:hidden}
/* 헤더 */
.sticky-top{position:sticky;top:0;z-index:40;background:#000;backdrop-filter:blur(8px)}
.hd{padding:max(14px,env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,#000 70%,rgba(0,0,0,0))}
.hd-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.hd-title{font-size:30px;font-weight:800;letter-spacing:-.5px}
.hd-sub{font-size:13px;color:var(--muted);font-weight:600}
.hd-sub.live{color:var(--green);font-weight:800;animation:subPulse 1.5s ease-in-out infinite}
@keyframes subPulse{0%,100%{opacity:1;text-shadow:0 0 10px rgba(48,209,88,.9),0 0 20px rgba(48,209,88,.45)}50%{opacity:.5;text-shadow:0 0 2px rgba(48,209,88,.15)}}
/* 공지 마퀴 */
.notice{overflow:hidden;white-space:nowrap;padding:7px 0;background:linear-gradient(90deg,#ff004c,#ff8a00,#ffe600,#00d26a,#00b3ff,#7a5cff,#ff004c);background-size:200% auto;animation:rainbow 4s linear infinite;margin:0 0 4px}
@keyframes rainbow{0%{background-position:0 50%}100%{background-position:200% 50%}}
.notice-trk{display:inline-block;animation:marq 10s linear infinite;will-change:transform}
@keyframes marq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.notice-txt{font-family:var(--mono);font-size:13px;font-weight:900;color:#000;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff}
/* 셀렉터: 텍스트 라벨 (결승만 우승컵) */
.stagebar{max-width:560px;margin:0 auto;padding:4px 10px 6px;display:flex;align-items:center;gap:6px}
.seg-pill{flex:1;display:flex;background:#2a2a2c;border-radius:16px;padding:2px 4px;gap:4px}
.ovv-btn{width:32px;align-self:stretch;border-radius:9px;background:#2a2a2c;border:none;color:var(--muted2);font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ovv-btn:active{filter:brightness(.7)}
.bk-round-nav{position:fixed;right:8px;top:140px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:50}
.bk-round-btn{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:rgba(28,28,30,.96);border:1px solid #48484a;border-radius:12px;color:var(--green);width:34px;padding:7px 3px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.7)}
.bk-round-btn.show{display:flex}
.bk-round-btn:active{filter:brightness(.8)}
.seg{flex:1;background:none;border:none;border-radius:12px;padding:5px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.seg.active{background:#fff}
.seg-tx{font-size:14px;font-weight:800;color:var(--muted2)}
.seg.active .seg-tx{color:#1c1c1e}
.seg-tx.trophy{font-size:18px}
/* 셀렉터/네비 버튼: 탭·포커스 시 밑줄/아웃라인 아티팩트 제거(iOS 포함) */
.seg,.seg-tx,.ovv-btn,.bk-round-btn{text-decoration:none!important;-webkit-text-decoration:none!important;-webkit-appearance:none;appearance:none}
.seg:focus,.seg:focus-visible,.seg:active,.ovv-btn:focus,.bk-round-btn:focus{outline:none!important;text-decoration:none!important;-webkit-text-decoration:none!important;box-shadow:none}
/* 조 순위표 */
.stand-col{position:absolute}
.stand{background:var(--card);border-radius:12px;margin-bottom:12px;border:1px solid var(--sep);padding:4px 8px 8px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.stand:active{filter:brightness(1.12)}
.stand.sel{animation:selBlink 1s ease-in-out infinite}
.st-head{padding:8px 4px 6px}
.st-gl{font-weight:800;color:#fff;font-size:14px}
.st-table{width:100%;border-collapse:collapse;font-size:13px}
.st-table th{font-size:10px;color:var(--muted);font-weight:600;font-family:var(--mono);padding:2px 0 6px;text-align:center}
.st-table td{padding:9px 2px;text-align:center;color:var(--muted2);font-variant-numeric:tabular-nums}
.st-table tbody tr+tr td{border-top:1px solid rgba(255,255,255,.06)}
.st-table .c-rk{width:18px;color:var(--muted);font-weight:700}
.st-table .c-fl{width:24px;font-size:16px}
.st-table .c-nm{text-align:left;color:#fff;font-weight:700;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.st-table .c-pts{color:#fff;font-weight:800}
.st-table tr.qual .c-rk{color:var(--green)}
/* 섹션 */
.wrap{max-width:560px;margin:0 auto;padding:8px 14px 20px}
/* 조별 그룹 박스 */
.grp{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden}
.grp-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer}
.grp-h .gl{font-size:17px;font-weight:800}
.grp-h .ga{font-size:13px;color:var(--muted);font-family:var(--mono)}
.grp-teams{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 13px}
.grp-team{display:flex;align-items:center;gap:6px;background:var(--card2);border-radius:8px;padding:5px 10px;font-size:14px;font-weight:600}
.grp-team .f{font-size:17px}
.grp-games{border-top:1px solid var(--sep);display:none}
.grp.open .grp-games{display:block}
.grp.open .grp-arr{transform:rotate(90deg)}
.grp-arr{color:var(--muted);transition:transform .2s;font-size:18px}
/* 라운드 헤더 */
.round-info{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 14px;line-height:1.5}
/* 브래킷 */
.bk-scroll{overflow-x:auto;overflow-y:hidden;margin:0 -14px;padding:0 6px}
.bk-scroll::-webkit-scrollbar{height:5px}.bk-scroll::-webkit-scrollbar-thumb{background:#3a3a3c;border-radius:3px}
.bk-stage{position:relative}
.bk-heads{position:relative;height:30px}
.bk-head{position:absolute;text-align:center;font-size:13px;font-weight:800;color:var(--muted);top:6px;transition:color .2s}
.bk-head.cur{color:var(--green)}
.bk-canvas{position:relative}
.bk-svg{position:absolute;top:0;left:0;pointer-events:none}
.bk-card{position:absolute;background:var(--card);border:1.5px solid transparent;border-radius:10px;padding:5px 9px;display:flex;flex-direction:column;justify-content:center;gap:3px;cursor:pointer;overflow:hidden;transition:top .45s cubic-bezier(.32,.72,0,1),width .35s ease,left .35s ease;will-change:top,width,left}
body.bk-snap .bk-card{transition:none!important}   /* 전체뷰→이동 시 카드 top 트랜지션 끔(레이아웃 스래싱 방지 → 페이지 스크롤만 부드럽게) */
/* 흰 배경 규칙: 베팅중(open)=bettable(초록 반짝 보더) / 베팅≥1건인 비open=betbg(상태 보더색 유지) */
@keyframes greenBlink{0%,100%{box-shadow:0 0 0 1.5px var(--green),0 0 14px 2px rgba(48,209,88,.6)}50%{box-shadow:0 0 0 1.5px rgba(48,209,88,.35),0 0 5px 1px rgba(48,209,88,.2)}}
.bk-card.bettable,.ovvbet,.grp-game.gg-open{background:#fff!important;border-color:var(--green)!important;animation:greenBlink 1.1s ease-in-out infinite}
.bk-card.betbg{background:#fff}
.bk-card.bettable .bk-dt,.bk-card.betbg .bk-dt{color:#555}
.bk-card.bettable .bk-n,.bk-card.betbg .bk-n{color:#111}
.bk-card.bettable .bk-n.tbd,.bk-card.betbg .bk-n.tbd{color:#999}
.bk-card.bettable .bk-s,.bk-card.betbg .bk-s{color:#111}
.bk-card.sel{animation:selBlink 1s ease-in-out infinite;z-index:6}
@keyframes selBlink{0%,100%{box-shadow:0 0 0 2px var(--selclr,#fff),0 0 16px 4px var(--selclr,#fff)}50%{box-shadow:0 0 0 2px var(--selclr,#fff),0 0 4px 1px var(--selclr,#fff)}}
.bk-card:active{filter:brightness(1.15)}
.bk-dt{font-size:12px;line-height:16px;height:16px;color:#fff;font-family:var(--mono);white-space:nowrap;overflow:hidden}
.bk-row{display:flex;align-items:center;gap:6px;height:20px}
.bk-f{font-size:15px;flex-shrink:0}
.bk-n{flex:1;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-n.tbd{color:var(--muted);font-weight:500;font-size:11px}
.bk-s{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff}
.bk-thirdlbl{position:absolute;text-align:center;font-size:12px;font-weight:700;color:var(--gold)}
/* 포커스 브래킷 (선택 라운드 + 다음 라운드) */
.bk-focus{position:relative;margin:10px 0 24px}
.bk-rh{position:absolute;text-align:center;font-size:13px;font-weight:800;color:var(--muted)}
.bk-rh.cur{color:var(--green)}
.sec-h{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 6px 8px;display:flex;align-items:center;gap:6px}
.sec-h .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
/* 경기 카드 */
.card{background:var(--card);border-radius:16px;margin-bottom:10px;overflow:hidden;border:1.5px solid transparent;transition:transform .12s,border-color .2s}
.card:active{transform:scale(.985)}
.card.bettable{border-color:var(--green);cursor:pointer}
.card.bettable.glow{animation:cardGlow 1.6s ease-in-out infinite}
@keyframes cardGlow{0%,100%{box-shadow:0 0 0 0 rgba(48,209,88,0)}50%{box-shadow:0 0 14px 1px rgba(48,209,88,.45)}}
.card-top{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 0;font-size:12px;color:var(--muted);font-family:var(--mono)}
.pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
.pill.live{background:rgba(48,209,88,.16);color:var(--green)}
.pill.soon{background:rgba(255,214,10,.16);color:var(--gold)}
.pill.closed{background:rgba(255,255,255,.08);color:var(--muted2)}
.pill.ft{background:rgba(255,255,255,.08);color:var(--muted2)}
.card-body{padding:8px 14px 12px}
.trow{display:flex;align-items:center;gap:12px;padding:7px 0}
.trow .flag{font-size:30px;width:38px;text-align:center;flex-shrink:0}
.trow .nm{flex:1;min-width:0}
.trow .nm b{font-size:18px;font-weight:700;letter-spacing:-.3px;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .nm s{display:block;text-decoration:none;font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.trow .sc{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;min-width:30px;text-align:center;color:#fff}
.trow.dim b,.trow.dim .sc{color:var(--muted2)}
.card-cta{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-top:1px solid var(--sep);font-size:14px;font-weight:700;color:var(--green)}
.card-info{padding:9px 14px;border-top:1px solid var(--sep);font-size:12px;color:var(--muted);font-family:var(--mono);display:flex;justify-content:space-between}
/* 플로팅 피드백 버튼 */
.fab-menu{position:fixed;right:10px;bottom:max(10px,env(safe-area-inset-bottom));z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab{width:37px;height:37px;border-radius:50%;background:var(--blue);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 13px rgba(10,132,255,.5);cursor:pointer}
.fab:active{transform:scale(.92)}
.fab-plus{font-size:23px;line-height:1;transition:transform .22s}
.fab-menu.open .fab-plus{transform:rotate(135deg)}
.fab-act{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px 0 11px;border-radius:17px;background:#2a2a2c;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.55);white-space:nowrap;font-family:var(--sys);opacity:0;transform:translateY(10px) scale(.92);pointer-events:none;transition:opacity .18s,transform .18s}
.fab-menu.open .fab-act{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.fab-act:active{filter:brightness(1.2)}
.fab-ic{font-size:15px;line-height:1}
/* 시트(모달) */
.sheet-ov{position:fixed;inset:0;background:transparent;z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;pointer-events:none;touch-action:none;transition:opacity .25s,background-color .25s,visibility 0s linear .28s}
.sheet-ov.show{background:rgba(0,0,0,.6);opacity:1;visibility:visible;pointer-events:auto;transition:opacity .25s,background-color .25s}
.sheet-ov.top-sheet>.sheet,.sheet-ov.top-sheet>.popup-sheet{outline:1.5px solid rgba(255,255,255,.9);outline-offset:-1.5px}
.sheet{position:relative;background:var(--card);width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92vh;max-height:92svh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
/* 아래 화살표 플로트(⌄⌄⌄ 세로 캐스케이드): 베팅하기 버튼이 스크롤 밖에 있을 때만 표시, 탭하면 버튼으로 스크롤 */
.scroll-hint{position:absolute;left:50%;bottom:14px;width:34px;height:54px;border-radius:17px;background:rgba(28,28,30,.94);border:1px solid #48484a;color:var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:5;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 2px 12px rgba(0,0,0,.65);transform:translateX(-50%)}
.scroll-hint span{font-size:16px;font-weight:800;line-height:11px}
.scroll-hint.show{opacity:1;pointer-events:auto}
.scroll-hint.show span{animation:hintSeq 1.1s ease-in-out infinite}
.scroll-hint.show span:nth-child(2){animation-delay:.15s}
.scroll-hint.show span:nth-child(3){animation-delay:.3s}
@keyframes hintSeq{0%,100%{opacity:.25}50%{opacity:1}}
.sheet-ov.show .sheet{transform:translateY(0)}
.sheet-grip{width:38px;height:5px;border-radius:3px;background:#48484a;margin:9px auto 4px;flex-shrink:0}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px;border-bottom:1px solid var(--sep);flex-shrink:0;background:var(--card)}
.sheet-ttl{font-size:18px;font-weight:800}
.x{background:var(--card2);border:none;color:var(--muted2);width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer}
.sheet-bd{padding:16px 18px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:max(20px,env(safe-area-inset-bottom))}
/* 스코어보드 */
.sb{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 0 18px}
.sb-team{flex:1;text-align:center}
.sb-team .flag{font-size:42px}
.sb-team .nm{font-size:15px;font-weight:700;margin-top:4px;letter-spacing:-.3px}
.sb-mid{font-size:13px;color:var(--muted);font-family:var(--mono)}
.sb-score{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums}
/* 현황 요약 */
.stat-grid{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:var(--card2);border-radius:12px;padding:8px;text-align:center}
.stat .v{font-size:16px;font-weight:800}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px}
/* 점수 분포 */
.dist-h{font-size:13px;font-weight:700;color:#fff;margin:6px 2px 8px}
.dist-sc{font-family:var(--mono);font-weight:800;font-size:17px;color:#fff;flex-shrink:0}
.dist-item{background:var(--card2);border-radius:12px;padding:10px 13px;margin-bottom:8px;border:1.5px solid transparent;transition:border-color .2s}
.dist-item.sel{border-color:#fff}
.dist-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dist-sep{height:1px;background:rgba(255,255,255,.08);margin:8px 0 6px}
.dist-names{font-size:12px;line-height:1.8}
/* 베팅 현황 뷰 토글 */
.bv-toggle{display:inline-flex;background:var(--card2);border-radius:9px;padding:2px;gap:2px;flex-shrink:0}
.bv-btn{border:none;background:none;color:#fff;font-size:12px;font-weight:700;padding:4px 11px;border-radius:7px;cursor:pointer;font-family:var(--sys)}
.bv-btn.on{background:var(--green);color:#000}
/* 스코어 매트릭스 */
.bmx{border-collapse:separate;border-spacing:3px;font-variant-numeric:tabular-nums;margin:2px auto}
.bmx th{font-size:11px;color:var(--muted);font-weight:700;font-family:var(--mono);text-align:center;padding:0}
.bmx td{padding:0}
.bmx-cell{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.bmx-corner{font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.2}
.bmx-cap{font-size:12px;color:#fff;text-align:center;margin-top:10px;font-family:var(--mono);line-height:1.5}
/* 그룹 경기 시트 */
.grp-game{display:flex;align-items:center;gap:8px;background:var(--card2);border:1.5px solid transparent;border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.grp-game:active{filter:brightness(1.12)}
/* 1명 이상 베팅: 흰 배경 + 스크롤뷰 카드 보더색(인라인) + 어두운 글자 */
.grp-game.gg-bet{background:#fff}
.grp-game.gg-bet .gg-n{color:#111}
.grp-game.gg-bet .gg-sc{color:#111}
.grp-game.gg-bet .gg-cnt{color:#111}
.gg-team{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.gg-team.gg-away{justify-content:flex-end}
.gg-f{font-size:21px;flex-shrink:0}
.gg-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gg-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:66px;flex-shrink:0}
.gg-sc{font-size:14px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.gg-sc.dt{font-size:14px;color:#fff;font-weight:600}
.gg-cnt{font-size:12px;color:#fff;font-weight:600;margin-top:2px;font-family:var(--mono)}
.empty{text-align:center;color:#fff;padding:24px;font-size:14px}
/* 버튼 */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--sys);text-decoration:none!important}
.btn-g{background:var(--green);color:#000}
.btn-k{background:#FEE500;color:#3C1E1E}
.btn-d{background:var(--card2);color:#fff}
.btn:active{filter:brightness(.93)}
.btn:disabled{opacity:.4}
/* 입력 */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;font-family:var(--mono)}
.input{width:100%;background:var(--card2);border:1.5px solid var(--sep);border-radius:12px;color:#fff;font-size:16px;padding:13px 14px;outline:none;font-family:var(--sys)}
.input:focus{border-color:var(--green)}
.score-in{display:flex;align-items:center;justify-content:center;gap:14px}
.score-in input{width:70px;height:70px;background:var(--card2);border:2px solid var(--sep);border-radius:14px;color:#fff;font-size:32px;font-weight:800;text-align:center;outline:none;-moz-appearance:textfield}
.score-in input::-webkit-outer-spin-button,.score-in input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-in input:focus{border-color:var(--green)}
.score-in .colon{font-size:26px;color:var(--muted)}
.score-cap{display:flex;justify-content:center;gap:90px;margin-top:6px;font-size:11px;color:var(--muted);font-family:var(--mono)}
/* 피드백 */
.fb-item{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.fb-h{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.fb-nm{font-weight:700;font-size:14px}
.fb-dt{font-size:11px;color:var(--muted);font-family:var(--mono)}
.fb-msg{font-size:14px;color:var(--muted2);line-height:1.5;word-break:break-word}
.fb-reply{margin-top:8px;padding:8px 10px;background:rgba(10,132,255,.1);border-left:2px solid var(--blue);border-radius:6px;font-size:13px;color:#fff;line-height:1.5;word-break:break-word}
.fb-reply-h{font-size:11px;color:var(--blue);margin-bottom:2px}.fb-reply-h b{font-weight:700}
.fb-cnt{text-align:right;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}
/* 피드백 시트: 입력 박스·버튼 컴팩트하게 (input font는 16px 유지 → iOS 포커스 확대 방지) */
#sh-fb .field{margin-bottom:9px}
#sh-fb .field label{font-size:11px;margin-bottom:3px}
#sh-fb .input{padding:8px 12px;border-radius:10px}
#sh-fb .btn{padding:9px;font-size:14px;border-radius:10px}
/* 토스트 */
.toast{position:fixed;left:0;right:0;bottom:90px;margin:auto;width:max-content;max-width:90%;background:#fff;color:#000;padding:12px 22px;border-radius:30px;font-weight:700;font-size:14px;opacity:0;transition:all .28s;pointer-events:none;z-index:200;transform:translateY(14px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red);color:#fff}
.loader{text-align:center;color:var(--muted);padding:50px;font-size:14px}
/* 팝업 (중앙, 툴바 안전영역 고려) */
.sheet-ov.popup{align-items:center;justify-content:center;padding:24px}
.popup-sheet{background:var(--card);width:100%;max-width:340px;border-radius:20px;max-height:78vh;overflow-y:auto;transform:scale(.9);opacity:0;transition:transform .25s,opacity .25s}
.sheet-ov.popup.show .popup-sheet{transform:scale(1);opacity:1}
.popup-card{text-align:center;padding:30px 22px 24px}
.popup-emoji{font-size:52px;margin-bottom:14px}
.popup-msg{font-size:16px;line-height:1.8}
@media(min-width:768px){
  .stagebar{max-width:1200px;padding:4px 24px 6px}
  .wrap{max-width:1200px;padding:8px 24px 20px}
  .bk-scroll{margin:0;padding:0}
}
@media(max-width:767px){
  .sheet-ov{padding:0 12px 12px}
  .sheet{border-radius:20px;max-height:calc(100dvh - 150px);box-shadow:0 18px 45px rgba(0,0,0,.45);transform:translateY(24px) scale(.98)}
  #sh-fb{padding-bottom:4px}
  #sh-fb .sheet{height:calc(100dvh - 8px);max-height:calc(100dvh - 8px)}
  #sh-game.has-bets{padding-bottom:4px}
  #sh-game.has-bets .sheet{height:calc(100dvh - 8px);max-height:calc(100dvh - 8px)}
  .sheet-ov.show .sheet{transform:translateY(0) scale(1)}
  .sheet-bd{padding-bottom:18px}
}
</style>

<body>
<div class="sticky-top">
  <div class="hd">
    <div class="hd-row">
      <div class="hd-title" id="site-title">또또</div>
      <div class="hd-sub" id="hd-sub" onclick="openActiveBets()" style="cursor:pointer"></div>
    </div>
  </div>
  <div id="notice" class="notice" style="display:none"><div class="notice-trk"><span class="notice-txt" id="notice-txt"></span></div></div>
  <div class="stagebar" id="stagebar"></div>
</div>
<div class="wrap" id="wrap"><div class="loader">불러오는 중...</div></div>

<!-- 플로팅 피드백 버튼 -->
<div class="fab-menu" id="fab-menu">
  <button class="fab-act" onclick="openActiveBets()"><span class="fab-ic">🔥</span>베팅중</button>
  <button class="fab-act" onclick="openFeedback()"><span class="fab-ic">💬</span>피드백</button>
  <button class="fab" onclick="toggleFab()" aria-label="메뉴"><span class="fab-plus">+</span></button>
</div>

<!-- 라운드 이동 플로팅 버튼 -->
<div class="bk-round-nav" id="bk-round-nav">
  <button class="bk-round-btn" id="bk-prev" onclick="goPrevRound()"></button>
  <button class="bk-round-btn" id="bk-ovv"></button>
  <button class="bk-round-btn" id="bk-next" onclick="goNextRound()"></button>
</div>

<!-- 경기 상세/베팅 시트 -->
<div class="sheet-ov" id="sh-game" onclick="ovClose(event,'sh-game')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-hd"><span class="sheet-ttl" id="g-title">경기</span><button class="x" onclick="closeSheet('sh-game')">×</button></div>
    <div class="sheet-bd" id="g-body"></div>
    <button class="scroll-hint" id="g-hint" onclick="scrollToBetBtn()" aria-label="베팅하기로 이동"><span>⌄</span><span>⌄</span><span>⌄</span></button>
  </div>
</div>

<!-- 조별 경기 시트 -->
<div class="sheet-ov" id="sh-group" style="z-index:99" onclick="ovClose(event,'sh-group')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-hd"><span class="sheet-ttl" id="grp-title">조별 경기</span><button class="x" onclick="closeSheet('sh-group')">×</button></div>
    <div class="sheet-bd" id="grp-body"></div>
    <button class="scroll-hint" id="grp-hint" onclick="scrollSheetDown('grp-body')" aria-label="아래로"><span>⌄</span><span>⌄</span><span>⌄</span></button>
  </div>
</div>

<!-- 피드백 시트 -->
<div class="sheet-ov" id="sh-fb" onclick="ovClose(event,'sh-fb')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-hd"><span class="sheet-ttl">💬 피드백</span><button class="x" onclick="closeSheet('sh-fb')">×</button></div>
    <div class="sheet-bd">
      <div class="field"><label>이름</label><input class="input" id="fb-name" maxlength="5" placeholder="이름 (한글/영문/숫자, 5자)"></div>
      <div class="field"><label>내용</label><input class="input" id="fb-msg" maxlength="100" placeholder="의견을 남겨주세요"></div>
      <div class="fb-cnt"><span id="fb-c">0</span>/100</div>
      <button class="btn btn-g" onclick="sendFeedback()" style="margin-bottom:18px">보내기</button>
      <div id="fb-list"></div>
    </div>
  </div>
</div>

<!-- 공지 팝업 -->
<div class="sheet-ov popup" id="sh-popup" onclick="ovClose(event,'sh-popup')">
  <div class="popup-sheet">
    <div class="popup-card">
      <div class="popup-emoji">⚽</div>
      <div class="popup-msg" id="popup-msg"></div>
      <button class="btn btn-d" style="margin-top:22px" onclick="closeSheet('sh-popup')">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='/api';
let CONFIG={},GAMES=[],BETS=[],RESULTS={};
let curGame=null;
let selStage='GS';            // GS|R32|R16|QF|SF|F
let openGroups={};            // 조별 펼침 상태
let betView='matrix';         // 경기 베팅 현황 보기 기본: matrix | list
const STAGES=[['GS','조별'],['R32','32강'],['R16','16강'],['QF','8강'],['SF','4강'],['F','결승']];

function stageOf(g){
  const gr=g.group||'';
  if(gr.startsWith('R32'))return 'R32';
  if(gr.startsWith('R16'))return 'R16';
  if(gr.startsWith('QF'))return 'QF';
  if(gr.startsWith('SF'))return 'SF';
  if(gr.startsWith('FINAL')||gr.startsWith('3RD'))return 'F';
  return 'GS';
}
function groupLetter(g){const m=(g.group||'').match(/^([A-Z])조$/);return m?m[1]:null;}

async function api(path,opts={}){
  try{const r=await fetch(API+path,{cache:'no-store',headers:{'Content-Type':'application/json'},...opts});
    if(!r.ok)throw 0;return await r.json();}catch(e){return null;}
}
function toast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function openSheet(id){
  const el=document.getElementById(id);
  const bd=el.querySelector('.sheet-bd');
  if(bd)bd.scrollTop=0;
  document.querySelectorAll('.sheet-ov.top-sheet').forEach(x=>x.classList.remove('top-sheet'));
  el.classList.add('show');
  el.classList.add('top-sheet');
  // body{overflow:hidden} 잠금은 iOS 사파리에서 뷰포트(하단 툴바)를 흔들어 공백을 만들어 사용 안 함.
  // 배경은 시트 오버레이가 덮고, 시트 내부 스크롤은 overscroll-behavior:contain으로 격리.
}
function closeSheet(id){
  const el=document.getElementById(id);
  el.classList.remove('show','top-sheet');
  const shown=[...document.querySelectorAll('.sheet-ov.show')];
  if(shown.length)shown[shown.length-1].classList.add('top-sheet');
}
function ovClose(e,id){if(e.target===e.currentTarget)closeSheet(id);}

function startMs(g){const v=Date.parse(`${(g.date||'').replace(/\./g,'-')}T${g.time||'00:00'}:00+09:00`);return isNaN(v)?0:v;}
function gBets(id){return BETS.filter(b=>String(b.game_id)===String(id));}
// 이월 판돈이 적용되는 "다음 게임" = 아직 종료되지 않은 경기 중 시작시각이 가장 빠른 경기
function carryTargetId(){
  const co=Number(CONFIG.carryover||0);if(!(co>0))return null;
  const cand=GAMES.filter(g=>!g.deleted&&gState(g)!=='ended');
  if(!cand.length)return null;
  cand.sort((a,b)=>(startMs(a)||9e15)-(startMs(b)||9e15));
  return String(cand[0].id);
}
function carryAmt(g){return String(g.id)===carryTargetId()?Number(CONFIG.carryover||0):0;}
function todayStr(){const d=new Date();return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function tsToDateStr(ts){const d=new Date(ts*1000);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function endedDateStr(g){const res=RESULTS[String(g.id)];const ts=res?res.registered_at:g.ended_at;return ts?tsToDateStr(ts):null;}
function gameBorderClr(g){
  const st=gState(g);
  if(st==='ended'){const ed=endedDateStr(g);return ed===todayStr()?'var(--blue)':'var(--gold)';}

  if(st==='closed')return 'var(--pink)';
  const ms=startMs(g);
  const h=teamSide(g,'home'),a=teamSide(g,'away');
  if(st==='open'&&ms>0&&h.known&&a.known)return 'var(--green)';   // 베팅중 + 확정
  if(ms>0&&h.known&&a.known)return '#fff';                        // 확정(베팅중 아님)
  return 'transparent';
}
function gState(g){
  const res=RESULTS[String(g.id)];
  if(res||g.status==='ended')return 'ended';
  if(g.status==='closed')return 'closed';
  if(g.status==='pending')return 'pending';
  return 'open';
}

async function loadAll(){
  const[cfg,games,bets,results]=await Promise.all([
    api('/config'),api('/games'),api('/bets'),api('/results')]);
  CONFIG=cfg||{};GAMES=games||[];BETS=bets||[];RESULTS=results||{};
  document.getElementById('site-title').textContent=CONFIG.site_title||'또또';
}

// 백그라운드 새로고침: 서버 데이터 다시 조회 → 변경됐을 때만 재렌더 (팝업 열기/탭 전환 시 호출)
let _refreshing=false;
async function refreshData(onChanged){
  if(_refreshing)return;
  _refreshing=true;
  try{
    const before=JSON.stringify([GAMES,BETS,RESULTS,CONFIG]);
    const sc=document.getElementById('bk-scroll');
    const savedScroll=sc?sc.scrollLeft:-1;
    await loadAll();
    if(JSON.stringify([GAMES,BETS,RESULTS,CONFIG])!==before){
      render();
      if(savedScroll>=0)setTimeout(()=>{const s=document.getElementById('bk-scroll');if(s)s.scrollLeft=savedScroll;},60);
      if(onChanged)onChanged();
    }
  }catch(e){}
  _refreshing=false;
}

let SECTION_X={};   // 각 단계의 가로 스크롤 위치
function render(){
  renderStageBar();
  const visible=GAMES.filter(g=>!g.deleted);
  const nOpen=visible.filter(g=>gState(g)==='open').length;
  const hdSub=document.getElementById('hd-sub');
  hdSub.textContent=`${nOpen>0?'● ':''}${nOpen}경기 베팅중`;
  hdSub.classList.toggle('live',nOpen>0);   // 베팅 가능 경기 있을 때만 초록 펄스
  if(ovvMode){
    document.getElementById('wrap').innerHTML=renderMiniOverview(visible);
    ['bk-next','bk-prev'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('show');});
    updateOvvBtn();
    return;
  }
  document.getElementById('wrap').innerHTML=renderFullBracket(visible);  // 조 순위표 + 브래킷 통합
  updateNextBtn();   // nav 버튼(이전/다음/ALL) 즉시 갱신 → 40ms 지연으로 인한 깜빡임 방지
  setTimeout(()=>{
    const sc=document.getElementById('bk-scroll');if(!sc)return;
    sc.scrollLeft=Math.max(0,(SECTION_X[selStage]||0)-6);
    sc.onscroll=()=>onBracketScroll(sc);
    bkFocus=selStage==='GS'?'R32':selStage;
    relayoutBracket(bkFocus);
  },40);
}
let bkFocus='R32';
// 셀렉터: 텍스트 라벨(GS, R32…), 결승만 우승컵
function renderStageBar(){
  const bar=document.getElementById('stagebar');
  bar.innerHTML=`<button class="ovv-btn" onclick="this.blur();toggleOverview()" title="전체 토너먼트" style="color:${ovvMode?'var(--green)':'var(--muted2)'};font-size:11px;font-weight:800">ALL</button><div class="seg-pill">${STAGES.map(([k])=>{
    const content=k==='F'?'🏆':k;
    return `<button class="seg ${!ovvMode&&selStage===k?'active':''}" data-stage="${k}" onclick="this.blur();setStage('${k}')"><span class="seg-tx ${k==='F'?'trophy':''}">${content}</span></button>`;
  }).join('')}</div>`;
}
function setStage(s,fromOvv){
  if(ovvMode)ovvMode=false;
  selStage=s; renderStageBar();
  const sc=document.getElementById('bk-scroll');
  if(sc){
    const f=s==='GS'?'R32':s;
    bkFocus=f; relayoutBracket(f);
    // 스크롤 중 onBracketScroll 간섭 방지: 잠시 해제하고 즉시 이동 후 복구
    sc.onscroll=null;
    sc.scrollLeft=Math.max(0,(SECTION_X[s]||0)-6);
    setTimeout(()=>{sc.onscroll=()=>onBracketScroll(sc);},fromOvv?260:80);
  }else render();
  if(!fromOvv)window.scrollTo({top:0,behavior:'smooth'});   // 탭 전환은 부드럽게 상단으로
}
// 가로 스크롤 → 셀렉터 동기화 + 포커스 라운드 바뀌면 재배치(reflow)
function onBracketScroll(sc){
  // 검출점: 뷰포트 25% 지점. 단 데스크탑처럼 넓을 때 다음 열로 넘어가지 않도록 열 너비 기준으로 제한
  const colSpan=(SECTION_X.R16||0)-(SECTION_X.R32||0)||120;
  const x=sc.scrollLeft+Math.min(sc.clientWidth*0.25, colSpan*0.6);
  let cur='GS';
  STAGES.forEach(([k])=>{if((SECTION_X[k]||0)<=x)cur=k;});
  if(cur!==selStage){selStage=cur;renderStageBar();}
  const f=cur==='GS'?'R32':cur;
  if(f!==bkFocus){
    bkFocus=f;relayoutBracket(f);
    // 포커스 라운드가 바뀌면 카드가 상단으로 재배치되므로, 버튼 이동과 동일하게 세로 스크롤도 상단 정렬(빈 화면 방지)
    if(window.scrollY>0)window.scrollTo(0,0);
  }
}

// 조 순위 계산 (결과 기반)
function computeStandings(visible){
  const gs=visible.filter(g=>gStage(g)==='GS');
  const groups={};
  gs.forEach(g=>{const L=groupLetter(g);if(L)(groups[L]=groups[L]||[]).push(g);});
  const out={};
  Object.keys(groups).sort().forEach(L=>{
    const tm={};
    const ens=t=>{if(!tm[t.short])tm[t.short]={short:t.short,name:t.name||t.short,flag:t.flag,gp:0,w:0,d:0,l:0,gf:0,ga:0};return tm[t.short];};
    groups[L].forEach(g=>{
      if(!g.home.short||!g.away.short)return;
      ens(g.home);ens(g.away);
      const r=RESULTS[String(g.id)];if(!r)return;
      const H=tm[g.home.short],A=tm[g.away.short];
      H.gp++;A.gp++;H.gf+=r.h;H.ga+=r.a;A.gf+=r.a;A.ga+=r.h;
      if(r.h>r.a){H.w++;A.l++;}else if(r.h<r.a){A.w++;H.l++;}else{H.d++;A.d++;}
    });
    const arr=Object.values(tm).map(t=>({...t,pts:t.w*3+t.d,gd:t.gf-t.ga}));
    arr.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.short.localeCompare(b.short));
    out[L]=arr;
  });
  return out;
}

// ── 토너먼트 브래킷 ──
const ROUNDS=['R32','R16','QF','SF','F'];
function gStage(g){return g.stage||stageOf(g);}
function matchRef(lb){const m=String(lb||'').match(/Match\s+(\d+)/i);return m?m[1]:null;}
function transLabel(lb){
  lb=String(lb||'');let m;
  if(m=lb.match(/Winner Match (\d+)/i))return 'TBD';
  if(m=lb.match(/Loser Match (\d+)/i))return 'TBD';
  if(m=lb.match(/Winner Group ([A-Z])/i))return m[1]+'조 1위';
  if(m=lb.match(/Runner-?up Group ([A-Z])/i))return m[1]+'조 2위';
  if(m=lb.match(/3rd Group ([A-Z\/]+)/i))return m[1]+' 3위';
  return lb||'TBD';
}
function teamSide(g,side){
  const t=g[side];
  if(t&&t.name)return{flag:t.flag,name:t.short,full:t.name,known:true};
  const lbl=transLabel(g[side+'_label']);
  return{flag:'⚪',name:lbl,full:lbl,known:false};
}

// 조별리그 순위표 (일반 흐름, iOS 안전)
const RLBL={R32:'32강',R16:'16강',QF:'8강',SF:'4강',F:'결승'};
function bkSort(a,b){return String(a.id).localeCompare(String(b.id),undefined,{numeric:true});}
function renderStandingsList(visible){
  const stand=computeStandings(visible);
  const letters=Object.keys(stand);
  if(!letters.length)return '<div class="empty">조별리그 정보가 없습니다</div>';
  return letters.map(L=>{
    const arr=stand[L];
    const rows=arr.map((t,i)=>`<tr class="${i<2?'qual':''}">
      <td class="c-rk">${i+1}</td><td class="c-fl">${t.flag}</td><td class="c-nm">${t.short}</td>
      <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gd>0?'+'+t.gd:t.gd}</td><td class="c-pts">${t.pts}</td></tr>`).join('');
    return `<div class="stand">
      <div class="st-head"><span class="st-gl">Group ${L}</span></div>
      <table class="st-table"><thead><tr><th class="c-rk"></th><th class="c-fl"></th><th class="c-nm"></th><th>GP</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');
}

// 동적 레이아웃: 보는 라운드를 기준으로 카드 세로 간격 재배치 (포커스 라운드=촘촘)
let BK=null;
function bkChildrenG(g){return [matchRef(g.home_label),matchRef(g.away_label)].map(x=>x&&BK.byId[x]).filter(c=>c);}
// 트리 위치(slot)를 DFS로 계산 → 형제가 인접 = 연결선 깔끔
// 순수 slot 계산: 전체뷰/스크롤뷰가 동일한 트리 배치를 쓰도록 공유 (렌더 순서 무관)
function computeSlotsFor(ko,byId,finalG,noLabels){
  const slot={};let s=0;
  function dfs(id){
    const g=byId[id];if(!g)return s++;
    const c=[matchRef(g.home_label),matchRef(g.away_label)].filter(x=>x&&byId[x]);
    if(!c.length){const v=s++;slot[id]=v;return v;}
    const ys=c.map(dfs);const v=ys.reduce((a,b)=>a+b,0)/ys.length;slot[id]=v;return v;
  }
  if(finalG&&!noLabels)dfs(String(finalG.id));
  else{ // 라벨 없음: 위치 기반
    s=0;ko.filter(g=>gStage(g)==='R32').sort(bkSort).forEach(g=>slot[g.id]=s++);
    ['R16','QF','SF','F'].forEach((r,i)=>{
      const prev=['R32','R16','QF','SF'][i];
      const gs=ko.filter(g=>gStage(g)===r).sort(bkSort),pv=ko.filter(g=>gStage(g)===prev).sort(bkSort);
      gs.forEach((g,j)=>{const a=pv[j*2],b=pv[j*2+1];slot[g.id]=((a?slot[a.id]:j*2)+(b?slot[b.id]:j*2+1))/2;});
    });
  }
  return slot;
}
function computeSlots(){const {ko,byId,finalG,noLabels}=BK;return computeSlotsFor(ko,byId,finalG,noLabels);}
// 포커스 라운드가 SP 간격이 되도록 전체 slot을 스케일 + 포커스 라운드를 항상 위(PADY)에 정렬
function bracketYc(focus){
  const {slot,SP,PADY,ko}=BK, fi=Math.max(0,ROUNDS.indexOf(focus));
  const scale=SP/Math.pow(2,fi);
  const yc={};
  for(const id in slot)yc[id]=slot[id]*scale;
  const ft=ko.filter(g=>gStage(g)===focus).map(g=>yc[g.id]).filter(v=>v!=null);
  const minTop=ft.length?Math.min(...ft):0;
  for(const id in yc)yc[id]=yc[id]-minTop+PADY;
  return yc;
}
function bracketLines(yc){
  const {ko,colX,CARDW,CARDH}=BK; let lines='';
  ko.forEach(g=>{
    const px=colX[gStage(g)],py=(yc[g.id]||0)+CARDH/2;
    bkChildrenG(g).forEach(c=>{const cx=colX[gStage(c)]+CARDW,cy=(yc[c.id]||0)+CARDH/2,mx=(cx+px)/2;
      lines+=`<path d="M${cx} ${cy} H${mx} V${py} H${px}" stroke="#48484a" stroke-width="1.5" fill="none"/>`;});
  });
  return lines;
}
function bkCardHtml(g){
  const {colX,CARDW,CARDH}=BK,st=gState(g),bett=st==='open',res=RESULTS[String(g.id)];
  const h=teamSide(g,'home'),a=teamSide(g,'away');
  // 모바일·데스크탑 모두 국가명 표기, 23자 초과 시 22자+".."
  const trunc=s=>{s=String(s||'');return s.length>23?s.slice(0,22)+'..':s;};
  const hn=h.known?trunc(h.full):h.name, an=a.known?trunc(a.full):a.name;
  const dt=g.date?`${g.date} ${g.time||''}`:'';
  const x=g.stage==='3RD'?colX.F:colX[gStage(g)];

  const bc=gameBorderClr(g),selc=bc==='transparent'?'#fff':bc;
  const nb=gBets(g.id).length;   // 베팅 있으면(비open) 흰 배경(betbg) — 보더는 상태색 유지

    <div class="bk-dt">${dt}${bett?' · ⚽':''}</div>

    <div class="bk-row"><span class="bk-f">${a.flag}</span><span class="bk-n ${a.known?'':'tbd'}">${an}</span><span class="bk-s">${res?res.a:''}</span></div>

}
// 포커스 라운드 기준 재배치 (카드 top 애니메이션 + 연결선 재계산)
function relayoutBracket(focus){
  if(!BK)return;
  const yc=bracketYc(focus);
  BK.ko.forEach(g=>{const el=document.getElementById('bkc-'+g.id);if(el&&yc[g.id]!=null)el.style.top=yc[g.id]+'px';});

    if(BK.third){

  let maxTop=BK.PADY;
  for(const id in yc){if(yc[id]>maxTop)maxTop=yc[id];}
  if(BK.third&&BK.finalG){const ft0=yc[BK.finalG.id]!=null?yc[BK.finalG.id]:BK.PADY;const tt0=ft0+BK.CARDH+60;if(tt0>maxTop)maxTop=tt0;}
  const newH=Math.max(maxTop+BK.CARDH+BK.PADY, BK.standColH||0);
  const cv=document.querySelector('#bk-scroll .bk-canvas');if(cv)cv.style.height=newH+'px';
  if(svg)svg.setAttribute('height',newH);
  updateNextBtn(focus,yc);
}

function calcBkLayout(vw,isDesk){
  const GS_GAP=18;
  let STANDW,COLW,CARDW;
  if(isDesk){
    STANDW=280;  // 풀네임 표시에 충분한 고정 너비
    const baseC=Math.max(130,Math.round((vw-GS_GAP-STANDW)/ROUNDS.length));
    CARDW=Math.round((baseC-22)*1.5);  // 데스크탑: 1.5배 넓은 카드
    COLW=CARDW+22;
  }else{
    STANDW=Math.min(280,vw-GS_GAP-20);   // 조 순위표 카드 가로 ≈270px(stW=STANDW-10), R32 왼쪽이 더 보이게
    COLW=Math.round(vw*0.66);
    CARDW=COLW-22;
  }
  const bx0=STANDW+GS_GAP;
  const colX={R32:bx0,R16:bx0+COLW,QF:bx0+2*COLW,SF:bx0+3*COLW,F:bx0+4*COLW};
  const W=colX.F+vw;
  const stW=STANDW-10;
  return{STANDW,COLW,CARDW,bx0,colX,W,stW};
}
// Apple식 통합: [조 순위표] + [R32~결승 브래킷] 한 캔버스, 가로 스크롤
function renderFullBracket(visible){

  SECTION_X={GS:0,R32:colX.R32-6,R16:colX.R16-6,QF:colX.QF-6,SF:colX.SF-6,F:colX.F-6};
  const finalG=ko.find(g=>gStage(g)==='F');
  const third=visible.find(g=>gStage(g)==='3RD');
  const noLabels=!(finalG&&(finalG.home_label||finalG.away_label));
  const nR32=ko.filter(g=>gStage(g)==='R32').length||16;
  BK={ko,byId,colX,CARDW,CARDH,SP,PADY,finalG,third,noLabels};
  BK.slot=computeSlots();
  const focus0=selStage==='GS'?'R32':selStage;
  const yc=bracketYc(focus0);

  if(finalG&&yc[finalG.id]!=null){

  }
  if(third&&finalG){
    const tt=yc[third.id]||PADY;
    cards+=`<div class="bk-thirdlbl" id="bk-thirdlbl" style="left:${colX.F}px;top:${tt-22}px;width:${CARDW}px">🥉 3·4위전</div>`+bkCardHtml(third);

      :grpGm.length&&grpGm.every(g=>gState(g)==='ended')?'var(--gold)'
      :grpGm.some(g=>gState(g)!=='ended'&&(gState(g)==='closed'||(startMs(g)>0&&startMs(g)<=now)))?'var(--pink)'
      :grpGm.some(g=>gState(g)!=='ended'&&startMs(g)>now)?'var(--green)'
      :'#38383a';
    const rows=arr.map((t,i)=>`<tr class="${i<2?'qual':''}">
      <td class="c-rk">${i+1}</td><td class="c-fl">${t.flag}</td><td class="c-nm" data-short="${t.short}" data-full="${t.name||t.short}">${isDesk?(t.name||t.short):t.short}</td>
      <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gd>0?'+'+t.gd:t.gd}</td><td class="c-pts">${t.pts}</td></tr>`).join('');
    return `<div class="stand" id="stand-${L}" style="border-color:${stBdr};--selclr:${stBdr==='#38383a'?'#fff':stBdr}" onclick="bkSelect(this);openGroupGames('${L}')"><div class="st-head"><span class="st-gl">Group ${L}</span></div>
      <table class="st-table"><thead><tr><th class="c-rk"></th><th class="c-fl"></th><th class="c-nm"></th><th>GP</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');
  const standHtml=letters.length?`<div class="stand-col" style="left:0;top:${PADY}px;width:${stW}px">${standTables}</div>`:'';
  // stand-col 높이: 여유 있게 계산 (헤더44 + 행44×n + 여백 60)
  const standColH=PADY+letters.reduce((sum,L)=>{const n=(stand[L]||[]).length;return sum+44+n*44+60;},0)+PADY;
  H=Math.max(H,standColH);
  BK.standColH=standColH;   // relayout 시 캔버스 최소 높이(조 순위표 기준)
  if(!ko.length&&!letters.length)return '<div class="empty">경기가 없습니다</div>';
  const heads=`<div class="bk-head" data-round="GS" style="left:0;width:${stW}px">조 순위</div>`+
    ROUNDS.map(r=>`<div class="bk-head" data-round="${r}" style="left:${colX[r]}px;width:${CARDW}px">${RLBL[r]}</div>`).join('');
  return `<div class="bk-scroll" id="bk-scroll"><div class="bk-stage" style="width:${W}px">
    <div class="bk-heads" style="width:${W}px">${heads}</div>
    <div class="bk-canvas" style="width:${W}px;height:${H}px">
      <svg class="bk-svg" id="bk-svg" width="${W}" height="${H}">${lines}</svg>${standHtml}${cards}
    </div></div></div>`;
}

// 브래킷 스크롤 → 현재 보는 라운드에 맞춰 상단 칩/헤더 강조
// ── 경기 상세 시트 ──
// ── 폭죽 (ttoto.html에서 이식) ──
(function(){
  let _raf,_particles=[];
  const COLORS=['#30d158','#ffd60a','#ff453a','#ffffff','#0a84ff','#ff6b9d','#ffa500','#c8ff00','#bf5af2'];
  function burst(cx,cy,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=2+Math.random()*11;
      _particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        alpha:1,size:3+Math.random()*5,
        rect:Math.random()<0.6,rot:Math.random()*Math.PI*2,
        rotV:(Math.random()-.5)*.35});
    }
  }
  function tick(ctx,cw,ch){
    const canvas=document.getElementById('fw-canvas');
    ctx.clearRect(0,0,cw,ch);
    _particles=_particles.filter(p=>p.alpha>0.01);
    _particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.vx*=0.99;
      p.alpha-=0.013;p.rot+=p.rotV;
      ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      if(p.rect)ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(_particles.length>0)_raf=requestAnimationFrame(()=>tick(ctx,cw,ch));
    else if(canvas)canvas.style.display='none';
  }
  window.launchFireworks=function(e){
    const canvas=document.getElementById('fw-canvas');
    if(!canvas)return;
    cancelAnimationFrame(_raf);_particles=[];
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    canvas.style.display='block';
    const ctx=canvas.getContext('2d');
    const cx=e.clientX,cy=e.clientY;
    burst(cx,cy,120);
    setTimeout(()=>burst(cx+(-60+Math.random()*120),cy+(-130+Math.random()*60),90),180);
    setTimeout(()=>burst(cx+(-60+Math.random()*120),cy+(-130+Math.random()*60),90),360);
    setTimeout(()=>burst(cx+(-80+Math.random()*160),cy+(-170+Math.random()*80),70),540);
    tick(ctx,canvas.width,canvas.height);
  };
})();
// 당첨 베팅 목록 (bet_type별 판정 — 서버 _bet_hits와 동일 기준)
function gWinners(g){
  const res=RESULTS[String(g.id)];if(!res)return[];
  const bt=g.bet_type||'exact';
  return gBets(g.id).filter(b=>bt==='wdl'
    ?Math.sign(Number(b.h)-Number(b.a))===Math.sign(Number(res.h)-Number(res.a))
    :Number(b.h)===Number(res.h)&&Number(b.a)===Number(res.a));
}

      <div class="gg-team gg-away"><span class="gg-n">${esc(a.name)}</span><span class="gg-f">${a.flag}</span></div>

function _renderActiveBetsBody(){
  // 진행 영역: 베팅중(open)+마감(closed) 전부 — 임박한 경기 먼저
  const live=GAMES.filter(g=>!g.deleted&&(gState(g)==='open'||gState(g)==='closed'))
    .sort((a,b)=>startMs(a)-startMs(b));
  // 베팅완료 영역: 종료(ended)됐고 베팅이 1건 이상 있었던 경기 — 최근 종료 먼저
  const done=GAMES.filter(g=>!g.deleted&&gState(g)==='ended'&&gBets(g.id).length>=1)
    .sort((a,b)=>startMs(b)-startMs(a));
  const games=[...live,...done];
  document.getElementById('grp-body').innerHTML=games.length?games.map(gameRowHtml).join(''):`<div class="empty">베팅중인 경기가 없어요</div>`;

// 스코어 매트릭스(홈 스코어×원정 스코어, 칸=예측 인원수)
function betMatrixHtml(g,mb,res){
  let maxS=2;
  mb.forEach(b=>{maxS=Math.max(maxS,Number(b.h),Number(b.a));});
  const N=Math.min(maxS,9);
  const cnt={};let cmax=0;
  mb.forEach(b=>{const bh=Number(b.h),ba=Number(b.a);if(bh>N||ba>N)return;const k=bh+'_'+ba;cnt[k]=(cnt[k]||0)+1;cmax=Math.max(cmax,cnt[k]);});
  const denom=cmax||1;
  const avail=Math.floor((Math.min(window.innerWidth,560)-36)*2/3);
  const HDR=35;   // 0행 높이 / 0열 너비
  const CS=45;    // 나머지 셀 크기
  const cellStyle=(extra='')=>`width:${CS}px;height:${CS}px;border-radius:6px;${extra}`;
  const thHd=`background:#fff;color:#000;font-weight:800;text-align:center`;
  const thSc=`${thHd};font-family:var(--mono);font-size:14px`;
  // 행 0: (0,0) 배경 없음 + (0,1~n) 홈팀 병합, 높이 HDR
  let head=`<tr style="height:${HDR}px">
    <th style="background:none;width:${HDR}px"></th>
    <th colspan="${N+2}" style="${thHd};font-size:15px">${g.home.flag} ${esc(g.home.short)}</th>
  </tr>`;
  // 행 1: (1~n,0) 원정팀 rowspan 시작 + (1,1) 빈 교차셀 + (1,2~n) 홈 득점 0~N, 높이 CS
  const awayVert=`${g.away.flag}<br>${esc(g.away.short).split('').join('<br>')}`;
  head+=`<tr style="height:${CS}px">
    <th rowspan="${N+2}" style="${thHd};width:${HDR}px;font-size:15px;line-height:1.5;vertical-align:middle;padding:2px 1px">${awayVert}</th>
    <th style="${thHd};width:${CS}px"></th>`;
  for(let hh=0;hh<=N;hh++)head+=`<th style="width:${CS}px;${thSc}">${hh}</th>`;
  head+='</tr>';
  // 행 2~n: (i,1) 원정 득점 + 데이터 셀
  let rows='';
  for(let aa=0;aa<=N;aa++){
    rows+=`<tr style="height:${CS}px"><th style="${thSc};width:${CS}px">${aa}</th>`;
    for(let hh=0;hh<=N;hh++){
      const c=cnt[hh+'_'+aa]||0;
      const isRes=res&&Number(res.h)===hh&&Number(res.a)===aa;
      const op=c?(0.16+0.84*(c/denom)).toFixed(2):0;
      const bg=c?`rgba(48,209,88,${op})`:'var(--card2)';
      const col=c?(c/denom>0.55?'#000':'#fff'):'transparent';
      const resBg=isRes?`background:var(--gold);color:#000;`:`background:${bg};color:${col};`;
      const cursor=c?'cursor:pointer;':'';
      const onclick=c?`onclick="jumpToScore(${hh},${aa})"`:'';
      rows+=`<td><div class="bmx-cell" ${onclick} style="${cellStyle()}${resBg}${cursor}">${isRes?c:(c||'')}</div></td>`;
    }
    rows+='</tr>';
  }
  return `<div style="padding:2px 0"><table class="bmx">${head}${rows}</table></div>
    <div class="bmx-cap">→ ${esc(g.home.short)} 스코어 · ↓ ${esc(g.away.short)} 스코어 · 칸 = 예측 인원${res?'<br>🟡 실제 결과':''}</div>`;
}
function renderGameBody(){
  const g=curGame,res=RESULTS[String(g.id)],st=gState(g),mb=gBets(g.id);
  const pot=mb.reduce((s,b)=>s+(b.amount||0),0);
  const paid=mb.filter(b=>b.paid).length;
  let h=`<div class="sb">
    <div class="sb-team"><div class="flag">${g.home.flag}</div><div class="nm">${g.home.short}</div></div>
    <div style="text-align:center">${res?`<div class="sb-score">${res.h} : ${res.a}</div>`:`<div class="sb-mid" style="color:#fff;font-size:16px">${g.date||''}<br>${g.time||''}</div>`}</div>
    <div class="sb-team"><div class="flag">${g.away.flag}</div><div class="nm">${g.away.short}</div></div>
  </div>`;
  // 이월 포함 판돈: 진행중=현재 이월(대상 경기만) / 종료=정산 기록(당첨 소진 used 또는 무당첨 재이월 in)
  const co=st==='ended'?(res?Number(res.carryover_used)||Number(res.carryover_in)||0:0):carryAmt(g);
  h+=`<div class="stat-grid">
    <div class="stat"><div class="v">${mb.length}</div><div class="l">베팅</div></div>
    <div class="stat"><div class="v">${(pot+co).toLocaleString()}</div><div class="l">판돈(원)</div></div>
    <div class="stat"><div class="v" style="color:var(--green)">${paid}</div><div class="l">입금확인</div></div>
  </div>`;
  // 이월 판돈 적용 대상 게임: 판돈 구성 안내
  if(co>0){
    h+=`<div style="background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.4);border-radius:12px;padding:10px 12px;margin:-2px 0 14px;text-align:center;font-size:13px;font-weight:700;color:var(--gold)">💰 이월 판돈 ${co.toLocaleString()}원 포함<br>(베팅 ${pot.toLocaleString()}원 + 이월 ${co.toLocaleString()}원)</div>`;
  }
  // 베팅 방식별 당첨 판정 (exact=정확 스코어, wdl=승무패 방향)
  const btype=(g.bet_type||'exact');
  const hitRes=(bh,ba)=>!!res&&(btype==='wdl'
    ?Math.sign(Number(bh)-Number(ba))===Math.sign(Number(res.h)-Number(res.a))
    :Number(bh)===Number(res.h)&&Number(ba)===Number(res.a));
  // 종료 + 당첨자 없음 → 판돈 이월 안내 (이 경기에 걸려 있던 이월(carryover_in) 포함 재이월)
  if(st==='ended'&&res&&mb.length&&!mb.some(b=>hitRes(b.h,b.a))){
    h+=`<div style="background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.4);border-radius:12px;padding:10px 12px;margin:-2px 0 14px;text-align:center;font-size:13px;font-weight:700;color:var(--gold)">💸 당첨자가 없어 판돈 ${(pot+co).toLocaleString()}원은 다음 경기로 이월됩니다${co>0?`<br><span style="font-size:12px;font-weight:600">(베팅 ${pot.toLocaleString()}원 + 이월 ${co.toLocaleString()}원)</span>`:''}</div>`;
  }
  // 점수 분포
  const paidPot=mb.filter(b=>b.paid).reduce((s,b)=>s+(b.amount||0),0);
  const groups={};
  mb.forEach(b=>{const k=`${b.h}-${b.a}`;(groups[k]=groups[k]||[]).push(b);});
  const sorted=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
  const maxN=sorted.length?sorted[0][1].length:0;
  h+=`<div class="dist-h" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
    <span>📊 베팅 현황</span>
    <span class="bv-toggle">
      <button class="bv-btn ${betView==='list'?'on':''}" onclick="setBetView('list')">리스트</button>
      <button class="bv-btn ${betView==='matrix'?'on':''}" onclick="setBetView('matrix')">매트릭스</button>
    </span></div>`;
  if(!sorted.length){
    // 베팅 0건: open일 때만 안내, 그 외(미등록/마감/종료)는 하단 상태 메시지로 대체하고 문구 표시 안 함
    if(st==='open')h+=`<div class="empty">아직 베팅이 없어요<br>첫 베팅의 주인공이 되어보세요!</div>`;
  }else if(betView==='matrix'){
    h+=betMatrixHtml(g,mb,res);
  }else{
    // 종료: 실제 당첨금(당첨 스코어에만, 전체 당첨자 기준 분배) / 진행: 스코어별 예상 수령액
    // 분배 판돈 = 입금확인 판돈 + 이월 (진행중: 현재 이월(co) / 종료: 정산 시 기록된 res.carryover_used)
    const winPaidCnt=st==='ended'&&res?mb.filter(b=>b.paid&&hitRes(b.h,b.a)).length:0;
    const coUsed=res?Number(res.carryover_used)||0:0;
    const winPayout=winPaidCnt>0&&(paidPot+coUsed)>0?Math.floor((paidPot+coUsed)/winPaidCnt):null;
    sorted.forEach(([sc,arr])=>{
      const[hh,aa]=sc.split('-');
      const names=arr.map(b=>`<span style="color:${b.paid?'var(--gold)':'var(--muted2)'}">${esc(b.name)}</span>`).join(' ');
      let rightHtml;
      if(st==='ended'&&res){
        const w=hitRes(hh,aa);
        rightHtml=`<span style="font-size:13px;font-weight:700"><span style="color:#fff">총 ${arr.length}명</span>${w?`<span style="color:var(--muted)"> · </span><span style="color:var(--gold)">🏆 당첨${winPayout!=null?` 인당 ${winPayout.toLocaleString()}원`:''}</span>`:''}</span>`;
      }else{
        const paidWinners=arr.filter(b=>b.paid).length;
        const payout=paidWinners>0&&(paidPot+co)>0?Math.floor((paidPot+co)/paidWinners):null;
        rightHtml=`<span style="font-size:13px;font-weight:700"><span style="color:#fff">총 ${arr.length}명</span>${payout!=null?`<span style="color:var(--muted)"> : </span><span style="color:var(--red)">예상 인당 ${payout.toLocaleString()}원</span>`:''}</span>`;
      }
      h+=`<div class="dist-item" id="dist-${hh}-${aa}">
        <div class="dist-top"><span class="dist-sc">${hh} : ${aa}</span>${rightHtml}</div>
        <div class="dist-sep"></div>
        <div class="dist-names">${names}</div>
      </div>`;
    });
  }
  // CTA
  if(st==='open'){
    h+=`<button class="btn btn-g" id="g-betbtn" style="margin-top:14px" onclick="openBetForm()">⚽ 이 경기에 베팅하기</button>`;
  }else if(st==='closed'){
    h+=`<div class="empty" style="margin-top:10px">🔒 베팅이 마감됐어요 · 결과를 기다려주세요</div>`;
  }else if(st==='ended'){
    h+=`<div class="empty" style="margin-top:10px">🏁 종료된 경기입니다</div>`;
  }else{
    h+=`<div class="empty" style="margin-top:10px">⏳ 베팅 준비 중입니다</div>`;
  }
  document.getElementById('g-body').innerHTML=h;
  requestAnimationFrame(updateGHint);
}

async function doBet(viaKakao){
  const g=curGame;
  const h=parseInt(document.getElementById('bet-h').value);
  const a=parseInt(document.getElementById('bet-a').value);
  const name=document.getElementById('bet-name').value.trim();
  if(isNaN(h)||isNaN(a)||h<0||a<0){toast('❌ 점수를 입력해주세요',true);return false;}
  if(!name){toast('❌ 이름을 입력해주세요',true);return false;}
  if(!/^[가-힣ㄱ-ㅎㅏ-ㅣa-zA-Z0-9]+$/.test(name)){toast('❌ 이름은 한글·영문·숫자만',true);return false;}
  localStorage.setItem('toto_name',name);
  const body={game_id:Number(g.id),name,h,a};
  // 카카오: 링크는 즉시 열고 저장은 백그라운드
  const p=fetch(API+'/bets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(async r=>{
      if(r.ok){toast('✅ 베팅 완료!');await refresh();renderGameBody();}
      else{const d=await r.json().catch(()=>({}));toast('❌ '+(d.detail||'베팅 실패'),true);}
    }).catch(()=>toast('❌ 서버 연결 실패',true));
  if(viaKakao)return true;       // 링크 열기 허용
  await p;return false;
}

let ovvMode=false;
function toggleOverview(){ovvMode=!ovvMode;render();}
function exitOvvAndGo(stage,gid,standL){
  ovvMode=false;
  // 스크롤/선택 타깃: KO는 카드(bkc-id), GS는 조 순위표(stand-L)
  const targetId=gid?('bkc-'+gid):(standL?('stand-'+standL):null);
  selGid=gid?String(gid):null;   // KO 카드면 선택 id 영속(흰 반짝임 유지), GS면 기존 KO선택 해제
  // 카드 top 트랜지션을 꺼서(레이아웃 스래싱 제거) 페이지 스크롤이 부드럽게 흐르게 함
  document.body.classList.add('bk-snap');
  setStage(stage,true);          // 전체뷰 이동: 상단 스크롤 건너뜀(이중 점프 방지)
  const done=()=>document.body.classList.remove('bk-snap');
  if(!targetId){setTimeout(done,60);return;}
  const computeY=()=>{
    const el=document.getElementById(targetId);
    if(!el||!el.offsetHeight)return null;
    const pageY=el.getBoundingClientRect().top+window.scrollY;   // KO(절대)·GS(흐름) 공통
    return Math.max(0,pageY-(window.innerHeight/2-el.offsetHeight/2));
  };
  // render relayout(40ms) 후 카드로 부드럽게(native smooth) 스크롤
  setTimeout(()=>{
    const el=document.getElementById(targetId);if(el)el.classList.add('sel');
    const y=computeY();if(y!=null)window.scrollTo({top:y,behavior:'smooth'});
    done();
  },130);
  // 폴백: native smooth 미동작 환경에서 도착 못했으면 즉시 보정
  setTimeout(()=>{const y=computeY();if(y!=null&&Math.abs(window.scrollY-y)>24)window.scrollTo(0,y);done();},820);
}

function flagToClr(emoji){
  if(!emoji||emoji==='⚪')return'#3a3a3c';
  try{
    const pts=[...emoji].map(c=>c.codePointAt(0));
    if(pts.length>=2&&pts[0]>=0x1F1E6){
      const iso=pts.slice(0,2).map(cp=>String.fromCharCode(cp-0x1F1E6+65)).join('');
      return TEAM_CLR[iso]||'#3a3a3c';
    }
  }catch(e){}
  return'#3a3a3c';
}
function miniRow(flag,name,known,score,rowH,dark){
  const clr=flagToClr(flag);
  const lbl=known?name:'TBD';
  const txtClr=dark?(known?'#111':'#999'):(known?'#fff':'#555');
  const scClr=dark?'#111':'#fff';
  return `<div style="display:flex;align-items:center;gap:2px;height:${rowH}px;padding:0 2px">
    <div style="width:4px;height:${rowH-4}px;background:${clr};border-radius:2px;flex-shrink:0"></div>
    <span style="flex:1;font-size:12px;font-weight:800;overflow:hidden;white-space:nowrap;color:${txtClr};letter-spacing:.2px">${lbl}</span>
    ${score!=null?`<span style="font-size:12px;font-weight:800;color:${scClr};text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0">${score}</span>`:''}
  </div>`;
}
function renderMiniOverview(visible){
  const ko=visible.filter(g=>ROUNDS.includes(gStage(g)));
  const byId={};ko.forEach(g=>byId[String(g.id)]=g);
  const _isDesk=window.innerWidth>=768;
  const vw=Math.min(window.innerWidth,_isDesk?1200:560)-(_isDesk?48:28);
  // 6개 칼럼(GS+5KO) 분할 — 데스크탑은 GS 칼럼을 1.5배로
  const BASE_COLW=Math.floor(vw/6);
  const GS_COLW=_isDesk?Math.floor(BASE_COLW*1.5):BASE_COLW;
  const KO_COLW=_isDesk?Math.floor((vw-GS_COLW)/ROUNDS.length):BASE_COLW;
  const COLW=BASE_COLW; // 하위 호환용
  const KO_CARDW=Math.floor((KO_COLW-4)*0.90);
  const KO_LEFT=4;
  // CARDH 40 / SP 50 (gap=10=GS_GAP) / KO 카드 GS 그룹 내 위아래 6px 균등 여백
  const CARDH=40,SP=50,HDR=22,PADY=HDR+4;
  const ROW=Math.floor(CARDH/2);
  const colX={};ROUNDS.forEach((r,i)=>{colX[r]=GS_COLW+KO_COLW*i;});
  // 슬롯 계산 — 스크롤뷰(computeSlots)와 동일한 트리 배치 사용 (BK 존재 여부 무관)
  const finalG2=ko.find(g=>gStage(g)==='F');
  const noLabels2=!(finalG2&&(finalG2.home_label||finalG2.away_label));
  const slot=computeSlotsFor(ko,byId,finalG2,noLabels2);
  const yc={};for(const id in slot)yc[id]=slot[id]*SP+PADY;
  const third=visible.find(g=>gStage(g)==='3RD');
  const finalG=ko.find(g=>gStage(g)==='F');
  if(third&&finalG)yc[third.id]=(yc[finalG.id]||PADY)+CARDH+4;
  const allYs=Object.values(yc);
  const canvasH=(allYs.length?Math.max(...allYs):PADY)+CARDH+PADY;
  const W=GS_COLW+KO_COLW*ROUNDS.length;
  // SVG 연결선
  let lines='';
  ko.forEach(g=>{
    const r=gStage(g);if(r==='3RD')return;
    const px=(colX[r]||0)+KO_LEFT,py=(yc[g.id]||PADY)+CARDH/2;
    [matchRef(g.home_label),matchRef(g.away_label)].forEach(ref=>{
      if(!ref)return;const c=byId[ref];if(!c)return;
      const cx=(colX[gStage(c)]||0)+KO_LEFT+KO_CARDW,cy=(yc[c.id]||PADY)+CARDH/2,mx=(cx+px)/2;
      lines+=`<path d="M${cx} ${cy} H${mx} V${py} H${px}" stroke="#3a3a3c" stroke-width="1" fill="none"/>`;
    });
  });
  // KO 미니 카드 (이모지 없음, 컬러바+코드)
  let cards='';
  ko.forEach(g=>{
    const r=gStage(g),st=gState(g),res=RESULTS[String(g.id)];
    const h=teamSide(g,'home'),a=teamSide(g,'away');
    const x=r==='3RD'?colX.F:colX[r];
    const top=yc[g.id]!=null?yc[g.id]:PADY;
    const bdr=gameBorderClr(g)||'#38383a';
    const bett=st==='open';
    const wbg=bett||gBets(g.id).length>0;   // 흰 배경 규칙: open 또는 베팅≥1 (스크롤뷰와 동일)
    const hn=_isDesk?h.full:h.name, an=_isDesk?a.full:a.name;
    cards+=`<div class="${bett?'ovvbet':''}" style="position:absolute;left:${x+KO_LEFT}px;top:${top}px;width:${KO_CARDW}px;height:${CARDH}px;background:${wbg?'#fff':'#1c1c1e'};border:1px solid ${bdr};border-radius:4px;overflow:hidden;box-sizing:border-box;cursor:pointer" onclick="exitOvvAndGo('${r==='3RD'?'F':r}','${g.id}')">
      ${miniRow(h.flag,hn,h.known,res!=null?res.h:null,ROW,wbg)}
      ${miniRow(a.flag,an,a.known,res!=null?res.a:null,ROW,wbg)}
    </div>`;
  });
  if(third&&finalG){
    const res=RESULTS[String(third.id)];
    const h=teamSide(third,'home'),a=teamSide(third,'away');
    const top3=yc[third.id]!=null?yc[third.id]:PADY;
    const bdr3=gameBorderClr(third)||'#38383a';
    const bett3=gState(third)==='open';
    const wbg3=bett3||gBets(third.id).length>0;
    const hn3=_isDesk?h.full:h.name, an3=_isDesk?a.full:a.name;
    cards+=`<div class="${bett3?'ovvbet':''}" style="position:absolute;left:${colX.F+KO_LEFT}px;top:${top3}px;width:${KO_CARDW}px;height:${CARDH}px;background:${wbg3?'#fff':'#1c1c1e'};border:1px solid ${bdr3};border-radius:4px;overflow:hidden;box-sizing:border-box;cursor:pointer" onclick="exitOvvAndGo('F','${third.id}')">
      ${miniRow(h.flag,hn3,h.known,res!=null?res.h:null,ROW,wbg3)}
      ${miniRow(a.flag,an3,a.known,res!=null?res.a:null,ROW,wbg3)}
    </div>`;
  }
  // GS 조별 카드 — 순위·득점 제거, KO 카드와 동일 포맷/크기
  const stand=computeStandings(visible);
  const letters=Object.keys(stand);
  let gsCards='';
  const hdrH=14,GS_GAP=10;
  const GS_LEFT=4;
  const GS_CARDW=GS_COLW-GS_LEFT-2;
  const GS_PADV=4;
  const GS_ROW=Math.floor((CARDH*2+GS_GAP-hdrH-GS_PADV*2)/4); // 17px → GS card = KO pair height (90px)
  let gsY=PADY;
  const td=todayStr();
  // 32강에 실제 배정된 국가코드 집합 (3위 진출국 판별의 유일한 근거)
  const r32Adv=new Set();
  ko.filter(g=>gStage(g)==='R32').forEach(g=>{
    if(g.home&&g.home.name&&g.home.short)r32Adv.add(g.home.short);
    if(g.away&&g.away.name&&g.away.short)r32Adv.add(g.away.short);
  });
  letters.forEach((L)=>{
    const arr=stand[L];
    const grpGames=visible.filter(g=>gStage(g)==='GS'&&groupLetter(g)===L);
    const now=Date.now();
    const grpBdr=grpGames.some(g=>gState(g)==='ended'&&endedDateStr(g)===td)?'var(--blue)'
      :grpGames.length&&grpGames.every(g=>gState(g)==='ended')?'var(--gold)'
      :grpGames.some(g=>gState(g)!=='ended'&&(gState(g)==='closed'||(startMs(g)>0&&startMs(g)<=now)))?'var(--pink)'
      :grpGames.some(g=>gState(g)!=='ended'&&startMs(g)>now)?'var(--green)'
      :'#38383a';
    const groupH=arr.length*GS_ROW+hdrH+GS_PADV*2;
    const rows=arr.map((t,i)=>{
      const clr=flagToClr(t.flag);
      const lbl=_isDesk?(t.name||t.short):t.short;
      // 32강 진출국만 강조: 1·2위 초록, 3위 진출국 흰색, 그 외 dim
      const txtClr=r32Adv.has(t.short)?(i<2?'var(--green)':'#fff'):'#555';
      return `<div style="display:flex;align-items:center;gap:3px;height:${GS_ROW}px;padding:0 4px">
        <div style="width:4px;height:${GS_ROW-4}px;background:${clr};border-radius:2px;flex-shrink:0"></div>
        <span style="flex:1;font-size:12px;font-weight:800;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:${txtClr};letter-spacing:.2px">${lbl}</span>
      </div>`;}).join('');
    gsCards+=`<div style="position:absolute;left:${GS_LEFT}px;top:${gsY}px;width:${GS_CARDW}px;overflow:hidden;background:#1c1c1e;border:1px solid ${grpBdr};border-radius:4px;padding:${GS_PADV}px 0;box-sizing:border-box;cursor:pointer" onclick="exitOvvAndGo('GS',null,'${L}')">
      <div style="font-size:10px;color:#fff;padding:0 4px;margin-bottom:1px">Grp ${L}</div>${rows}
    </div>`;
    gsY+=groupH+GS_GAP;
  });
  const gsCanvasH=gsY+PADY;
  const totalH=Math.max(canvasH,gsCanvasH);
  // 컬럼 헤더
  let hdrs=`<div style="position:absolute;left:0;width:${GS_COLW}px;top:3px;text-align:center;font-size:10px;font-weight:800;color:#8e8e93;cursor:pointer" onclick="exitOvvAndGo('GS')">GS</div>`;
  ROUNDS.forEach(r=>{
    hdrs+=`<div style="position:absolute;left:${colX[r]}px;width:${KO_COLW}px;top:3px;text-align:center;font-size:10px;font-weight:800;color:#8e8e93;cursor:pointer" onclick="exitOvvAndGo('${r}')">${r==='F'?'🏆':r}</div>`;
  });
  return `<div style="position:relative;width:${W}px">
    <div style="position:relative;height:${HDR}px">${hdrs}</div>
    <div style="position:relative;width:${W}px;height:${totalH}px">
      <svg width="${W}" height="${totalH}" style="position:absolute;top:0;left:0;pointer-events:none">${lines}</svg>
      ${gsCards}${cards}
    </div>
    <p style="text-align:center;font-size:11px;color:#444;padding:8px 0 4px">라운드를 탭해서 이동</p>
  </div>`;
}

function goPrevRound(){
  const idx=STAGES.findIndex(([k])=>k===selStage);
  if(idx>0)setStage(STAGES[idx-1][0]);
}
function goNextRound(){
  const idx=STAGES.findIndex(([k])=>k===selStage);
  if(idx<STAGES.length-1)setStage(STAGES[idx+1][0]);
}
function updateNextBtn(focus,yc){
  const nav=document.getElementById('bk-round-nav');
  const btnPrev=document.getElementById('bk-prev');
  const btnNext=document.getElementById('bk-next');
  if(!btnNext)return;
  const idx=STAGES.findIndex(([k])=>k===selStage);
  // 이전 버튼
  if(btnPrev){
    if(idx<=0){btnPrev.classList.remove('show');}
    else{
      const[prevKey]=STAGES[idx-1];
      const prevLabel=prevKey==='F'?'🏆':prevKey;
      btnPrev.innerHTML=`<span style="font-size:15px;line-height:1">‹</span><span style="font-size:10px;font-weight:800;line-height:1.3">${prevLabel}</span>`;
      btnPrev.classList.add('show');
    }
  }
  // 다음 버튼
  if(idx>=STAGES.length-1){btnNext.classList.remove('show');}
  else{
    const[nextKey]=STAGES[idx+1];
    const nextLabel=nextKey==='F'?'🏆':nextKey;
    btnNext.innerHTML=`<span style="font-size:10px;font-weight:800;line-height:1.3">${nextLabel}</span><span style="font-size:15px;line-height:1">›</span>`;
    btnNext.onclick=goNextRound;       // overview에서 바꾼 onclick 복구
    btnNext.style.visibility='';
    btnNext.classList.add('show');
  }
  // 세로 위치: stagebar 바로 아래 고정
  if(nav){const sb=document.getElementById('stagebar');if(sb){const r=sb.getBoundingClientRect();nav.style.top=(r.bottom+8)+'px';}}
  updateOvvBtn();
}
function updateOvvBtn(){
  const btn=document.getElementById('bk-ovv');if(!btn)return;
  const nav=document.getElementById('bk-round-nav');
  const next=document.getElementById('bk-next');
  if(ovvMode){
    // GS 이동 버튼을 스크롤뷰의 '상위 라운드(다음)' 버튼과 같은 위치(아래 슬롯)에 배치.
    // 위 슬롯(bk-ovv)은 투명 공백 버튼으로 둬서 정렬을 맞춤(위치 계산 없이 자연 배치).
    btn.innerHTML=`<span style="font-size:15px;line-height:1">‹</span><span style="font-size:10px;font-weight:800;line-height:1.3">ALL</span>`;
    btn.style.opacity='0';
    btn.style.pointerEvents='none';
    btn.onclick=null;
    btn.classList.add('show');
    if(next){
      next.innerHTML=`<span style="font-size:10px;font-weight:800;line-height:1.3">GS</span><span style="font-size:15px;line-height:1">›</span>`;
      next.onclick=()=>exitOvvAndGo('GS');
      next.style.visibility='';
      next.classList.add('show');
    }
    if(nav){const sb=document.getElementById('stagebar');if(sb){const r=sb.getBoundingClientRect();nav.style.top=(r.bottom+8)+'px';}}
  }else if(selStage==='GS'){
    btn.style.opacity='';btn.style.pointerEvents='';
    btn.innerHTML=`<span style="font-size:15px;line-height:1">‹</span><span style="font-size:10px;font-weight:800;line-height:1.3">ALL</span>`;
    btn.onclick=toggleOverview;
    btn.classList.add('show');
  }else{
    btn.style.opacity='';btn.style.pointerEvents='';
    btn.classList.remove('show');
  }
}

function updateNotice(){

  const now=Date.now(),items=[];
  GAMES.filter(g=>!g.deleted&&gState(g)==='open').forEach(g=>{
    const diff=startMs(g)-now;
    if(diff<=0||diff>864e5)return;
    const hh=Math.floor(diff/36e5),mn=Math.floor(diff%36e5/6e4),s=Math.floor(diff%6e4/1e3);
    const[Y,Mo,Da]=(g.date||'').split('.');
    items.push(`📢 ${Y}년 ${+Mo}월 ${+Da}일 ${g.time||''} ${g.home.short} vs ${g.away.short} 베팅 종료 ${hh}시간 ${mn}분 ${s}초 전입니다.`);
  });

  bar.style.display='block';
  const m=items.join('       ')+'              ';txt.textContent=m+m;

function resizeBracketCards(){
  if(!BK)return;
  const sc=document.getElementById('bk-scroll');
  if(!sc)return;
  const isD=window.innerWidth>=768;
  const vw=Math.min(window.innerWidth,isD?1200:560)-(isD?48:0);
  const{CARDW,colX,W,stW}=calcBkLayout(vw,isD);
  // 컨테이너 너비 업데이트
  ['.bk-stage','.bk-heads','.bk-canvas'].forEach(sel=>{
    const el=sc.querySelector(sel);if(el)el.style.width=W+'px';
  });
  const svg=document.getElementById('bk-svg');
  if(svg){svg.setAttribute('width',W);svg.style.width=W+'px';}
  // 컬럼 헤더 위치·너비
  sc.querySelectorAll('.bk-head').forEach(el=>{
    const r=el.dataset.round;
    if(r==='GS'){el.style.width=stW+'px';return;}
    if(colX[r]!=null){el.style.left=colX[r]+'px';el.style.width=CARDW+'px';}
  });
  // 카드 너비·위치 + 팀명 전환 (transition이 width/left 애니메이션)
  const updateCards=gs=>gs.forEach(g=>{
    const el=document.getElementById('bkc-'+g.id);if(!el)return;
    const h=teamSide(g,'home'),a=teamSide(g,'away');
    const nms=el.querySelectorAll('.bk-n');
    if(nms[0])nms[0].textContent=isD?h.full:h.name;
    if(nms[1])nms[1].textContent=isD?a.full:a.name;
    const x=g.stage==='3RD'?colX.F:colX[gStage(g)];
    el.style.left=x+'px';el.style.width=CARDW+'px';
  });
  updateCards(BK.ko);
  if(BK.third)updateCards([BK.third]);
  const tl=document.getElementById('bk-thirdlbl');
  if(tl){tl.style.left=colX.F+'px';tl.style.width=CARDW+'px';}
  const fl=document.getElementById('bk-finallbl');
  if(fl){fl.style.left=colX.F+'px';fl.style.width=CARDW+'px';}
  // GS 순위표 국가명 업데이트
  sc.querySelectorAll('.c-nm[data-short]').forEach(td=>{
    td.textContent=isD?(td.dataset.full||td.dataset.short):td.dataset.short;
  });
  BK.colX=colX;BK.CARDW=CARDW;
  SECTION_X={GS:0,R32:colX.R32-6,R16:colX.R16-6,QF:colX.QF-6,SF:colX.SF-6,F:colX.F-6};
  if(svg)svg.innerHTML=bracketLines(BK.yc);
}
let _bkIsDesk=window.innerWidth>=768;
let _resizeTimer=null;
function _checkBreakpoint(){
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    const w=(window.visualViewport&&window.visualViewport.width)||window.innerWidth;
    const isD=w>=768;
    if(isD===_bkIsDesk)return;
    _bkIsDesk=isD;
    const sc=document.getElementById('bk-scroll');
    const savedScroll=sc?sc.scrollLeft:-1;
    render();
    if(savedScroll>=0)setTimeout(()=>{const s=document.getElementById('bk-scroll');if(s)s.scrollLeft=savedScroll;},50);
  },150);
}
window.addEventListener('resize',_checkBreakpoint);
window.addEventListener('orientationchange',()=>setTimeout(_checkBreakpoint,300));
if(window.visualViewport)window.visualViewport.addEventListener('resize',_checkBreakpoint);

// ── 초기화 ──
if('scrollRestoration' in history)history.scrollRestoration='manual';   // 브라우저 스크롤 복원 끔(뷰 전환 시 위치 고정 방지)
(async()=>{
  await loadAll();
  ovvMode=true;   // 메인 진입 시 ALL(전체 뷰) 기본
  render();
  updateNotice();
  maybePopup();
  setInterval(updateNotice,1000);
  setInterval(refresh,600000);  // 10분마다 자동 갱신
  const fbMsg=document.getElementById('fb-msg');
  fbMsg.addEventListener('input',()=>document.getElementById('fb-c').textContent=fbMsg.value.length);
})();
</script>
